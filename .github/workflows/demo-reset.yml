name: Nightly demo reset

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Cleanup demo data
        run: psql "$SUPABASE_DEMO_DB_URL" -v ON_ERROR_STOP=1 -f supabase/cleanup-demo-data.sql
        env:
          SUPABASE_DEMO_DB_URL: ${{ secrets.SUPABASE_DEMO_DB_URL }}

      - name: Seed demo data
        run: psql "$SUPABASE_DEMO_DB_URL" -v ON_ERROR_STOP=1 -f supabase/seed-demo-data.sql
        env:
          SUPABASE_DEMO_DB_URL: ${{ secrets.SUPABASE_DEMO_DB_URL }}
